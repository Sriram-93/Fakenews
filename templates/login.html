{% extends "layout.html" %}

{% block content %}
<div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
    <div class="card" style="width: 100%; max-width: 440px; padding: 4rem 3rem;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: 1.5rem;">
                <rect width="32" height="32" rx="10" fill="var(--primary)"/>
                <path d="M12 16L15 19L20 13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h2 style="font-size: 2rem; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 0.5rem;">Welcome back</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Enter your credentials to access your account.</p>
        </div>

        <form action="#" method="post">
            <div style="display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem;">
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="username" style="font-size: 0.875rem; font-weight: 600; color: var(--text-muted);">Username</label>
                    <input type="text" name="username" id="username" class="analysis-input" style="padding: 0.875rem 1rem; margin: 0; border-radius: 12px;" placeholder="johndoe" required>
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label for="password" style="font-size: 0.875rem; font-weight: 600; color: var(--text-muted);">Password</label>
                        <a href="#" style="font-size: 0.875rem; font-weight: 600; color: var(--primary); text-decoration: none;">Forgot password?</a>
                    </div>
                    <input type="password" name="password" id="password" class="analysis-input" style="padding: 0.875rem 1rem; margin: 0; border-radius: 12px;" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="border-radius: 12px; height: 3.5rem;">Log in to TruthVerify</button>
        </form>

        <div style="margin-top: 2rem; text-align: center; font-size: 0.95rem; color: var(--text-muted);">
            Don't have an account? <a href="/signin" style="color: var(--primary); font-weight: 700; text-decoration: none;">Sign up for free</a>
        </div>
    </div>
</div>
{% endblock %}
